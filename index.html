<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Media Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ---------------------------------------------------------
   MATERIAL DESIGN 3 COLOR SYSTEM (LIGHT + DARK)
--------------------------------------------------------- */
:root {
    --md-primary: #145DA0;
    --md-primary-container: #D0E4FF;
    --md-on-primary-container: #001C38;

    --md-surface: #FDFBFF;
    --md-surface-variant: #E0E2EC;
    --md-surface-container: #E6E8F0;

    --md-outline: #757780;
    --md-on-surface: #1B1B21;
    --md-on-surface-variant: #444650;

    --radius-medium: 16px;
    --radius-large: 24px;

    --transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
}

@media (prefers-color-scheme: dark) {
    :root {
        --md-primary: #9FC9FF;
        --md-primary-container: #004A77;
        --md-on-primary-container: #D0E4FF;

        --md-surface: #121316;
        --md-surface-variant: #2A2D31;
        --md-surface-container: #1E2024;

        --md-outline: #8E9196;
        --md-on-surface: #E2E2E6;
        --md-on-surface-variant: #C4C6CA;
    }
}

/* ---------------------------------------------------------
   BASE LAYOUT
--------------------------------------------------------- */
body {
    margin: 0;
    font-family: "Roboto", system-ui, sans-serif;
    background: var(--md-surface);
    color: var(--md-on-surface);
    opacity: 0;
    transform: translateY(12px) scale(0.98);
    transition: opacity 260ms var(--transition), transform 260ms var(--transition);
}

body.page-entered {
    opacity: 1;
    transform: translateY(0) scale(1);
}

body.page-exit {
    opacity: 0;
    transform: translateY(-8px) scale(0.96);
}

main {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 48px;
}

/* ---------------------------------------------------------
   FLOATING TOP APP BAR
--------------------------------------------------------- */
.app-bar-container {
    position: sticky;
    top: 0;
    padding: 16px;
    display: flex;
    justify-content: center;
    z-index: 10;
}

.app-bar {
    background: var(--md-surface-container);
    border-radius: 999px;
    padding: 10px 20px;
    border: 1px solid var(--md-outline);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 960px;
    width: 100%;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}

.app-bar-title {
    font-size: 1rem;
    font-weight: 600;
}

.app-bar-spacer {
    flex: 1;
}

/* ---------------------------------------------------------
   HERO SECTION
--------------------------------------------------------- */
.hero {
    background: linear-gradient(135deg,
        var(--md-primary-container),
        var(--md-surface-variant)
    );
    border-radius: var(--radius-large);
    padding: 32px 24px;
    color: var(--md-on-primary-container);
    margin-bottom: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
}

.hero-title {
    font-size: 2.2rem;
    font-weight: 700;
    margin: 0 0 8px;
}

.hero-subtitle {
    max-width: 420px;
    opacity: 0.9;
    margin: 0 0 16px;
}

.hero-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.hero-chip {
    background: rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 0.8rem;
    backdrop-filter: blur(10px);
}

/* ---------------------------------------------------------
   SERVICE CARDS
--------------------------------------------------------- */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
}

.card {
    background: var(--md-surface-container);
    border-radius: var(--radius-medium);
    padding: 22px 20px;
    border: 1px solid var(--md-outline);
    text-decoration: none;
    color: var(--md-on-surface);
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    transform: translateY(8px) scale(0.98);
    opacity: 0;
    animation: card-enter 360ms var(--transition) forwards;
}

.card:nth-child(2) { animation-delay: 80ms; }

@keyframes card-enter {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card:hover {
    transform: translateY(-2px) scale(1.01);
    border-color: var(--md-primary);
    box-shadow: 0 8px 20px rgba(0,0,0,0.55);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* ---------------------------------------------------------
   BRAND ICONS (FIXED SIZE)
--------------------------------------------------------- */
.service-icon {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.service-icon svg {
    width: 30px !important;
    height: 30px !important;
    display: block;
}

/* ---------------------------------------------------------
   CARD TEXT
--------------------------------------------------------- */
.card-title {
    font-size: 1.2rem;
    font-weight: 600;
}

.card-desc {
    color: var(--md-on-surface-variant);
}

.accent {
    margin-top: auto;
    color: var(--md-primary);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: var(--transition);
}

.card:hover .accent {
    color: var(--md-primary-container);
    transform: translateX(2px);
}
</style>
</head>

<body>

<!-- ---------------------------------------------------------
     FLOATING TOP APP BAR
--------------------------------------------------------- -->
<div class="app-bar-container">
    <div class="app-bar">
        <div class="app-bar-title">Media Hub</div>
        <div class="app-bar-spacer"></div>
    </div>
</div>

<main>

<!-- ---------------------------------------------------------
     HERO
--------------------------------------------------------- -->
<section class="hero">
    <h1 class="hero-title">Request. Stream. Relax.</h1>
    <p class="hero-subtitle">
        Logins can be requested via email at addme@travb.wtf
    </p>
    <div class="hero-chips">
        <span class="hero-chip">Movies</span>
        <span class="hero-chip">TV Shows</span>
        <span class="hero-chip">Fuck Netflix</span>
    </div>
</section>

<!-- ---------------------------------------------------------
     SERVICE CARDS
--------------------------------------------------------- -->
<section class="grid">

    <!-- JELLYFIN -->
    <a class="card shared-axis-link" href="https://watch.travb.wtf/">
        <div class="card-header">
            <div class="service-icon">
                <svg viewBox="0 0 512 512" width="30" height="30">
                    <defs>
                        <linearGradient id="jellyfinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00A4DC"/>
                            <stop offset="100%" stop-color="#7B3FE4"/>
                        </linearGradient>
                    </defs>
                    <path fill="url(#jellyfinGradient)"
                          d="M256 64L64 416h384L256 64zm0 96l120 208H136L256 160z"/>
                </svg>
            </div>
            <div>
                <div class="card-title">Jellyfin</div>
                <div class="card-desc">Stream movies and shows.</div>
            </div>
        </div>
        <div class="accent">Open Jellyfin →</div>
    </a>

    <!-- JELLYSEERR -->
    <a class="card shared-axis-link" href="https://request.travb.wtf/">
        <div class="card-header">
            <div class="service-icon">
                <svg viewBox="0 0 512 512" width="30" height="30">
                    <defs>
                        <linearGradient id="seerrGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FF6A3D"/>
                            <stop offset="100%" stop-color="#FFB347"/>
                        </linearGradient>
                    </defs>
                    <circle cx="256" cy="256" r="208" fill="url(#seerrGradient)"/>
                    <path fill="#FFFFFF" d="M312 164c-20-14-44-20-68-20-52 0-92 30-92 76 0 44 32 64 76 74l20 4c26 6 40 14 40 30 0 20-20 32-48 32-26 0-48-10-64-26l-32 36c24 24 60 40 100 40 60 0 104-30 104-82 0-48-34-68-80-78l-20-4c-24-6-36-14-36-30 0-18 18-30 44-30 22 0 40 8 52 18l28-40z"/>
                </svg>
            </div>
            <div>
                <div class="card-title">Seerr</div>
                <div class="card-desc">Request new content.</div>
            </div>
        </div>
        <div class="accent">Open Jellyseerr →</div>
    </a>

</section>

</main>

<script>
/* ---------------------------------------------------------
   SHARED-AXIS TRANSITION
--------------------------------------------------------- */
(function () {
    const body = document.body;

    function onReady() {
        requestAnimationFrame(() => body.classList.add('page-entered'));

        document.querySelectorAll('a.shared-axis-link').forEach(link => {
            link.addEventListener('click', e => {
                if (e.metaKey || e.ctrlKey || e.shiftKey || e.button !== 0) return;
                e.preventDefault();
                const url = link.href;
                body.classList.add('page-exit');
                setTimeout(() => window.location.href = url, 220);
            });
        });
    }

    document.readyState === 'loading'
        ? document.addEventListener('DOMContentLoaded', onReady)
        : onReady();
})();
</script>

</body>
</html>
